    <style>
      html {
        scrollbar-width: none;
      }
      html::-webkit-scrollbar {
        display: none;
      }

      .video-wrap {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow-card);
        overflow: hidden;
      }

      .video-header {
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }

      .video-title {
        font-size: 1.1rem;
        font-weight: 700;
      }

      .video-subtitle {
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-top: 4px;
      }

      .video-actions {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .video-status {
        padding: 12px 20px;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
        font-size: 0.95rem;
      }

      .videos-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
        padding: 16px;
      }

      .video-card {
        display: block;
        text-decoration: none;
        color: inherit;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        background: rgba(255, 255, 255, 0.03);
        transition: transform 0.2s, border-color 0.2s, background 0.2s;
      }

      .video-card:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
        background: var(--accent-glow);
      }

      .video-thumb {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: var(--bg-solid);
        display: block;
        object-fit: cover;
      }

      .video-meta {
        padding: 12px 14px;
      }

      .video-name {
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1.35;
        margin-bottom: 6px;
      }

      .video-date {
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      .video-note {
        color: var(--text-muted);
        font-size: 0.9rem;
        padding: 14px 20px;
        border-top: 1px solid var(--border);
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <header class="header">

        <div>
          <h1 class="logo"><a href="./" style="text-decoration:none;color:inherit">Videos</a></h1>
          <p class="tagline">Watch me play Arcs on: <a id="youtubeChannelLink" href="https://www.youtube.com/@Yan_Yannik" target="_blank" rel="noopener noreferrer" style="text-decoration: underline;">YouTube ↗</a></p>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">

            <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
        <a href="../" class="home-button" aria-label="Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 11.5L12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V11.5z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Home</span>
        </a>
        </div>
      </div>
    </header>

    <nav class="nav">
